name: pupil
description: "동공 지진 탐지기 — 얼굴 인식 진실게임"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 핵심 (shadowrun 검증)
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  intl: ^0.20.2
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  path_provider: ^2.1.4

  # 광고
  google_mobile_ads: ^5.3.0

  # pupil 전용
  camera: ^0.11.0+2                    # 전면 카메라
  google_mlkit_face_detection: ^0.13.1 # 얼굴 + 랜드마크 트래킹 (로컬, 무료)
  screenshot: ^3.0.0                   # 결과 캡처 (틱톡용)
  gal: ^2.3.0                          # 갤러리 저장
  audioplayers: ^6.1.0                 # SFX 재생

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sfx/
