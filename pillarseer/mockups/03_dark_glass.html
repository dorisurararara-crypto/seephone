<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>03 Dark Glass</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&family=Manrope:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root { --bg1:#050714; --bg2:#0F1428; --glass:rgba(255,255,255,0.04); --glass-strong:rgba(255,255,255,0.08); --line:rgba(255,255,255,0.08); --text:#EAECF7; --muted:#7A8198; --accent:#7DD3FC; --accent2:#5EEAD4; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Manrope','Inter','Noto Sans KR',sans-serif;color:var(--text);display:flex;justify-content:center;min-height:100vh}
.phone{width:390px;min-height:100vh;background:
  radial-gradient(ellipse at top, #1A1F45 0%, var(--bg2) 30%, var(--bg1) 70%),
  linear-gradient(180deg, var(--bg1), #000);
  position:relative;overflow:hidden}
.phone::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:
  radial-gradient(circle at 20% 30%, rgba(125,211,252,0.08) 0%, transparent 40%),
  radial-gradient(circle at 80% 70%, rgba(94,234,212,0.06) 0%, transparent 40%);pointer-events:none}
.phone>*{position:relative;z-index:1}
.appbar{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--line)}
.appbar .t{font-size:12px;letter-spacing:4px;color:var(--muted);font-weight:300}
.appbar .chip{font-size:9px;letter-spacing:2px;color:var(--accent);background:var(--glass);border:1px solid rgba(125,211,252,0.3);padding:5px 10px;border-radius:99px;backdrop-filter:blur(10px)}
.body{padding:28px 24px 40px}
.hero{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:20px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-30%;width:200%;height:200%;background:conic-gradient(from 45deg, transparent, rgba(125,211,252,0.06), transparent, rgba(94,234,212,0.04), transparent);animation:spin 20s linear infinite;pointer-events:none}
@keyframes spin{to{transform:rotate(360deg)}}
.hero>*{position:relative;z-index:1}
.hero .label{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;font-weight:400}
.hero .name{font-family:'Noto Sans KR';font-size:48px;font-weight:300;letter-spacing:-1px;line-height:1.1;background:linear-gradient(135deg, var(--accent), var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;margin-bottom:6px}
.hero .sub{font-size:13px;letter-spacing:1px;color:var(--muted)}
.hero .meta{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.hero .pill{font-size:10px;letter-spacing:1.5px;padding:5px 10px;background:var(--glass-strong);border:1px solid var(--line);border-radius:99px;color:var(--text)}
.hero .pill.acc{color:var(--accent);border-color:rgba(125,211,252,0.3)}
.pillars-card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:20px}
.pillars-card .header{font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:14px;text-align:center}
.pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.p{background:var(--glass-strong);border:1px solid var(--line);border-radius:14px;padding:14px 6px;text-align:center}
.p.day{background:linear-gradient(180deg, rgba(125,211,252,0.12), rgba(125,211,252,0.04));border-color:rgba(125,211,252,0.3)}
.p .l{font-size:9px;letter-spacing:2px;color:var(--muted);margin-bottom:10px}
.p .h{font-family:'Noto Sans KR';font-size:22px;font-weight:300;line-height:1.2}
.p.day .h{color:var(--accent)}
.card{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px}
.card .lbl{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:12px}
.card .txt{font-size:14px;line-height:1.7;color:var(--text);font-weight:300}
.cta{margin-top:24px;padding:18px;background:linear-gradient(135deg, rgba(125,211,252,0.15), rgba(94,234,212,0.1));border:1px solid rgba(125,211,252,0.3);border-radius:99px;text-align:center;color:var(--accent);letter-spacing:3px;font-size:12px;font-weight:500;cursor:pointer;backdrop-filter:blur(10px)}
</style></head>
<body><div class="phone">
<div class="appbar"><div class="t">PILLAR SEER</div><div class="chip">◆ PRECISION</div></div>
<div class="body">
  <div class="hero">
    <div class="label">YOUR DAY MASTER</div>
    <div class="name">丁卯</div>
    <div class="sub">Fire Rabbit · 화 토끼 · 정묘</div>
    <div class="meta">
      <span class="pill acc">편인격</span>
      <span class="pill">용신 木</span>
      <span class="pill">신왕</span>
      <span class="pill">공망 戌·亥</span>
    </div>
  </div>
  <div class="pillars-card">
    <div class="header">FOUR PILLARS · 四柱</div>
    <div class="pillars">
      <div class="p"><div class="l">YEAR</div><div class="h">癸<br>酉</div></div>
      <div class="p"><div class="l">MONTH</div><div class="h">丁<br>巳</div></div>
      <div class="p day"><div class="l">DAY</div><div class="h">丁<br>卯</div></div>
      <div class="p"><div class="l">HOUR</div><div class="h">—<br>—</div></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">YOU ARE</div>
    <div class="txt">한결같은 사람. 속도보다 깊이, 격찬보다 정확함을 신뢰합니다. 오랜 시간 속에서 본질이 드러나는 사주.</div>
  </div>
  <div class="cta">전체 풀이 보기 →</div>
</div>
</div></body></html>
